<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Header Processor</title>

  <style>
    :root {
      --bg: #0f1115;
      --surface: #171a21;
      --surface-2: #1d212b;
      --border: #2b3140;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --button: #252b36;
      --button-text: #e5e7eb;
      --primary: #1e3a5f;
      --primary-text: #bfdbfe;
      --success: #163322;
      --success-text: #86efac;
      --danger: #3a1d22;
      --danger-text: #fca5a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrapper {
      max-width: 1180px;
      margin: 28px auto;
      padding: 0 18px;
    }

    .app {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .title-block {
      margin-bottom: 18px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .title-block p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar,
    .secondary-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .secondary-actions {
      margin-top: 12px;
      margin-bottom: 0;
    }

    button.action {
      border: 1px solid var(--border);
      background: var(--button);
      color: var(--button-text);
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    button.action:hover {
      opacity: 0.95;
    }

    button.action.primary {
      background: var(--success);
      color: var(--success-text);
    }

    button.action.secondary {
      background: var(--primary);
      color: var(--primary-text);
    }

    button.action.danger {
      background: var(--danger);
      color: var(--danger-text);
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .count {
      font-size: 12px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 470px;
      border: none;
      outline: none;
      resize: vertical;
      padding: 14px;
      background: transparent;
      color: var(--text);
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .credit {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.6;
    }

    @media (max-width: 850px) {
      .panels {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 260px;
      }

      .bottom-bar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="app">

      <div class="title-block">
        <h1>Email Header Processor</h1>
        <p>Anonymize, strip and sanitize email headers</p>
      </div>

      <div class="toolbar">
        <button class="action primary" type="button" onclick="doProcess()">Process</button>
        <button class="action secondary" type="button" onclick="doProcessPlus()">Process+</button>
        <button class="action danger" type="button" onclick="doClear()">Clear</button>
      </div>

      <div class="panels">
        <div class="panel">
          <div class="panel-header">
            <h2>Input</h2>
            <span class="count" id="input-count">0 lines</span>
          </div>
          <textarea id="input_text" placeholder="Paste raw email headers here..."></textarea>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h2>Output</h2>
            <span class="count" id="output-count">0 lines</span>
          </div>
          <textarea id="output_text" readonly placeholder="Processed output will appear here..."></textarea>
        </div>
      </div>

      <div class="secondary-actions">
        <button class="action" type="button" onclick="copyOutput()">Copy Output</button>
        <button class="action" type="button" onclick="saveOutput()">Save Output</button>
      </div>

      <div class="bottom-bar">
        <div class="status" id="status-text">Ready — paste your email in the input box and click Process</div>
        <div class="credit">Hatim ELKHATTABI · CMH11</div>
      </div>

    </div>
  </div>

  <script>
    const STRIP_HEADERS = new Set([
      "delivered-to",
      "x-received",
      "arc-seal",
      "arc-message-signature",
      "arc-authentication-results",
      "authentication-results",
      "return-path",
      "received-spf",
      "dkim-signature"
    ]);

    function processEmail(content) {
      content = content.replace(
  /^(From:\s*)(.*?)(<?)([^@\s<>\n]+)@([^\s<>\n>]+)(>?)$/gim,
  (match, prefix, beforeEmail, open, local, domain, close) => {
    if (open && close) {
      return `${prefix}${beforeEmail}${open}${local}@[P_RPATH]${close}`;
    }
    return `${prefix}${beforeEmail}${local}@[P_RPATH]`;
  }
);

      if (/^Sender:/im.test(content)) {
        content = content.replace(
          /^(Sender:.*?)@[^\s>\n]+/gim,
          '$1@[RDNS]'
        );
      } else {
        content = content.replace(
          /^(From:.*)$/m,
          '$1\nSender: support@[RDNS]'
        );
      }

      content = content.replace(
        /^(Message-ID:\s*<?[^@\s<>\n]+)@/gim,
        '$1[EID]@'
      );

      return content;
    }

    function processEmailPlus(content) {
      content = processEmail(content);

      const lines = content.split('\n');
      const filtered = [];
      let skip = false;

      for (const line of lines) {
        if (skip && line && (line[0] === ' ' || line[0] === '\t')) {
          continue;
        }

        skip = false;
        const match = line.match(/^([A-Za-z0-9_-]+)\s*:/);

        if (match && STRIP_HEADERS.has(match[1].toLowerCase())) {
          skip = true;
          continue;
        }

        filtered.push(line);
      }

      content = filtered.join('\n');

      if (!/^CC\s*:/im.test(content)) {
        content = content.replace(
          /^(To:.*)$/m,
          '$1\nCC: [*to]'
        );
      }

      return content;
    }

    function countLines(value) {
      if (!value.trim()) return 0;
      return value.split('\n').length;
    }

    function updateCounts() {
      const input = document.getElementById('input_text').value;
      const output = document.getElementById('output_text').value;

      document.getElementById('input-count').textContent = countLines(input) + ' lines';
      document.getElementById('output-count').textContent = countLines(output) + ' lines';
    }

    function setStatus(message) {
      document.getElementById('status-text').textContent = message;
    }

    function doProcess() {
      const input = document.getElementById('input_text').value.trim();

      if (!input) {
        setStatus('Paste email content first.');
        return;
      }

      document.getElementById('output_text').value = processEmail(input);
      updateCounts();
      setStatus('Processing complete.');
    }

    function doProcessPlus() {
      const input = document.getElementById('input_text').value.trim();

      if (!input) {
        setStatus('Paste email content first.');
        return;
      }

      document.getElementById('output_text').value = processEmailPlus(input);
      updateCounts();
      setStatus('Process+ complete — headers stripped and CC injected.');
    }

    function doClear() {
      document.getElementById('input_text').value = '';
      document.getElementById('output_text').value = '';
      updateCounts();
      setStatus('Cleared.');
    }

    async function copyOutput() {
      const output = document.getElementById('output_text').value;

      if (!output.trim()) {
        setStatus('Nothing to copy.');
        return;
      }

      try {
        await navigator.clipboard.writeText(output);
        setStatus('Output copied to clipboard.');
      } catch (error) {
        const textarea = document.getElementById('output_text');
        textarea.select();
        document.execCommand('copy');
        setStatus('Output copied to clipboard.');
      }
    }

    function saveOutput() {
      const output = document.getElementById('output_text').value;

      if (!output.trim()) {
        setStatus('Nothing to save.');
        return;
      }

      const blob = new Blob([output], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'updatedEmail.txt';
      link.click();
      URL.revokeObjectURL(url);

      setStatus('Output saved as updatedEmail.txt.');
    }

    document.getElementById('input_text').addEventListener('input', updateCounts);
    window.onload = updateCounts;
  </script>
</body>
</html>
